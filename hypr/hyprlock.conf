general {
    disable_loading_bar = false
    grace = 0
    hide_cursor = true
}

input-field {
    size = 250, 50
    position = 0, -80
    halign = center
    valign = center

    outline_thickness = 2

    outer_color = rgba(255, 255, 255, 0.2)
    inner_color = rgba(0, 0, 0, 0.5)
    font_color = rgba(255, 255, 255, 1)

    fade_on_empty = false
    placeholder_text = <i>Enter Password...</i>
}

label {
    text = cmd[update:1000] echo "$(date +'%H:%M')"
    font_size = 60
    position = 0, 80
    halign = center
    valign = center
}
